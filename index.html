<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revisão de Códigos — Almoxarifado Aluminas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --steel-950:#101216;
  --steel-900:#171A20;
  --steel-800:#22262E;
  --steel-line:rgba(255,255,255,0.10);
  --surface:#F1F2EF;
  --card:#FFFFFF;
  --line:#DDDFD8;
  --line-strong:#C6C9C0;
  --ink:#1A1D21;
  --muted:#666C71;
  --amber:#F0A32F;
  --amber-ink:#B0770E;
  --keep:#2E7D4F;   --keep-bg:#E2F0E7;  --keep-line:#9FC9AE;
  --drop:#C2452D;   --drop-bg:#F9E7E1;  --drop-line:#E0A797;
  --pend:#83857E;   --pend-bg:#EBECE7;  --pend-line:#C9CBC2;
  --loc:#3D5A80;    --loc-bg:#E3E9F1;
  --radius:10px;
  --shadow:0 1px 2px rgba(16,18,22,.06), 0 6px 20px rgba(16,18,22,.06);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--surface);
  color:var(--ink);
  font-family:'Archivo',system-ui,sans-serif;
  -webkit-font-smoothing:antialiased;
}
.mono{font-family:'IBM Plex Mono',monospace;}
button{font-family:inherit;}

/* ============ TOPBAR ============ */
.topbar{
  background:linear-gradient(180deg, var(--steel-900), var(--steel-950));
  color:#EDEEEA;
  padding:20px clamp(16px,4vw,32px) 18px;
  border-bottom:3px solid var(--amber);
}
.brand-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.brand-mark{
  font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
  color:var(--amber);
  border:1px solid rgba(240,163,47,.45);
  background:rgba(240,163,47,.08);
  padding:4px 10px;border-radius:5px;
}
.save-pill{
  margin-left:auto;
  font-size:11.5px;font-weight:600;letter-spacing:.04em;
  display:inline-flex;align-items:center;gap:7px;
  padding:5px 12px;border-radius:99px;
  border:1px solid var(--steel-line);
  background:rgba(255,255,255,.05);
  color:#B9BDB4;
  transition:all .25s ease;
}
.save-pill .dot{width:7px;height:7px;border-radius:50%;background:#7A7F77;}
.save-pill.saving .dot{background:var(--amber);animation:pulse 1s infinite;}
.save-pill.saved .dot{background:#5DBB84;}
.save-pill.error{border-color:rgba(224,110,80,.6);color:#F0B4A4;}
.save-pill.error .dot{background:#E06E50;}
@keyframes pulse{50%{opacity:.35;}}

h1{
  font-weight:900;font-size:clamp(19px,3vw,24px);
  letter-spacing:-0.01em;margin:12px 0 3px;
}
.subtitle{font-size:13px;color:#A9ADA4;margin:0 0 16px;font-weight:400;}
.subtitle strong{color:#D7DAD2;font-weight:600;}

/* Progress rail — segmented bin bar */
.rail{
  height:14px;border-radius:7px;overflow:hidden;
  display:flex;background:var(--steel-800);
  border:1px solid var(--steel-line);
}
.rail .seg{height:100%;transition:width .45s cubic-bezier(.2,.8,.3,1);min-width:0;}
.rail .seg.keep{background:#3E9463;}
.rail .seg.drop{background:#CE5A41;}
.rail .seg.pend{background:transparent;}
.rail-caption{
  display:flex;justify-content:space-between;
  font-size:11px;color:#8B9088;margin-top:6px;
  font-family:'IBM Plex Mono',monospace;
}

/* Stat chips = clickable status filters */
.stats-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;}
.stat-chip{
  cursor:pointer;
  background:rgba(255,255,255,.04);
  border:1px solid var(--steel-line);
  border-radius:8px;
  padding:8px 14px;min-width:96px;
  text-align:left;color:inherit;
  transition:border-color .15s ease, background .15s ease, transform .1s ease;
}
.stat-chip:hover{transform:translateY(-1px);background:rgba(255,255,255,.07);}
.stat-chip .n{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;display:block;line-height:1.15;}
.stat-chip .l{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:#8B9088;}
.stat-chip.keep .n{color:#7ED2A0;}
.stat-chip.drop .n{color:#F0A18C;}
.stat-chip.pend .n{color:#D8CFA6;}
.stat-chip.active{border-color:var(--amber);background:rgba(240,163,47,.10);}
.stat-chip.active .l{color:var(--amber);}
.stat-chip:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}

/* ============ BANNERS ============ */
.banner{
  display:none;margin:14px clamp(16px,4vw,32px) 0;
  padding:12px 16px;border-radius:var(--radius);
  font-size:13px;line-height:1.5;
  background:#FBEFD8;border:1px solid #E4C078;color:#7A5510;
}
.banner.error{background:#F9E7E1;border-color:#E0A797;color:#8C3320;}
.banner.show{display:block;}
.banner button{
  margin-left:10px;border:1px solid currentColor;background:transparent;
  color:inherit;font-weight:600;font-size:12px;border-radius:6px;
  padding:3px 10px;cursor:pointer;
}

/* ============ TOOLBAR ============ */
.toolbar{
  position:sticky;top:0;z-index:20;
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  padding:12px clamp(16px,4vw,32px);
  background:rgba(241,242,239,.92);
  backdrop-filter:blur(8px);
  border-bottom:1px solid var(--line);
}
.toolbar input[type=text], .toolbar select{
  font-family:inherit;font-size:13.5px;
  border:1px solid var(--line-strong);border-radius:8px;
  padding:9px 12px;background:var(--card);color:var(--ink);
}
.toolbar input[type=text]:focus, .toolbar select:focus{
  outline:2px solid var(--amber);outline-offset:-1px;
}
#search{flex:1 1 220px;min-width:170px;}
.reviewer-field{
  display:flex;align-items:center;gap:7px;
  font-size:12px;color:var(--muted);font-weight:600;
  text-transform:uppercase;letter-spacing:.05em;
}
.reviewer-field input{width:130px;}
.spacer{flex:1;}
.btn{
  border-radius:8px;border:1px solid var(--line-strong);
  padding:9px 15px;font-size:13px;font-weight:600;cursor:pointer;
  background:var(--card);color:var(--ink);
  transition:transform .1s ease;
}
.btn:hover{transform:translateY(-1px);}
.btn.primary{background:var(--steel-900);color:#F2F3EF;border-color:var(--steel-900);}

/* ============ TABLE ============ */
.table-wrap{padding:16px clamp(16px,4vw,32px) 48px;max-width:1240px;margin:0 auto;}
table{width:100%;border-collapse:separate;border-spacing:0 6px;}
thead th{
  text-align:left;font-size:10.5px;font-weight:700;
  text-transform:uppercase;letter-spacing:.09em;color:var(--muted);
  padding:2px 12px 6px;user-select:none;
}
thead th[data-sort]{cursor:pointer;}
thead th[data-sort]:hover{color:var(--ink);}
.sort-arrow{color:var(--amber-ink);}
tbody tr.row td{
  background:var(--card);
  border-top:1px solid var(--line);
  border-bottom:1px solid var(--line);
  padding:9px 12px;font-size:13.5px;vertical-align:middle;
}
tbody tr.row td:first-child{border-left:4px solid var(--pend-line);border-radius:8px 0 0 8px;}
tbody tr.row td:last-child{border-right:1px solid var(--line);border-radius:0 8px 8px 0;}
tbody tr.row.s-manter td:first-child{border-left-color:var(--keep);}
tbody tr.row.s-excluir td:first-child{border-left-color:var(--drop);}
tbody tr.row.s-excluir .nome-cell{color:var(--muted);text-decoration:line-through;text-decoration-color:rgba(194,69,45,.5);}
.codigo-cell{font-size:12.5px;color:var(--ink);white-space:nowrap;}
.nome-cell{max-width:380px;}
.badge{
  display:inline-block;font-size:10.5px;font-weight:600;
  text-transform:uppercase;letter-spacing:.05em;color:var(--muted);
  background:var(--surface);border:1px solid var(--line);
  border-radius:5px;padding:3px 8px;white-space:nowrap;
}
.has-obs{color:var(--amber-ink);font-size:12px;margin-left:6px;}

.status-group{display:flex;gap:5px;}
.stamp{
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  padding:6px 11px;border-radius:7px;border:1.5px solid var(--line-strong);
  background:transparent;color:var(--muted);cursor:pointer;
  transition:transform .1s ease;
}
.stamp:hover{transform:translateY(-1px);}
.stamp.active-manter{background:var(--keep-bg);border-color:var(--keep);color:var(--keep);}
.stamp.active-excluir{background:var(--drop-bg);border-color:var(--drop);color:var(--drop);}
.stamp.active-pendente{background:var(--pend-bg);border-color:var(--pend);color:var(--muted);}
.stamp.flash{animation:stampflash .3s ease;}
@keyframes stampflash{0%{transform:scale(1.3) rotate(-4deg);}100%{transform:scale(1);}}

.local-group{display:flex;gap:4px;}
.local-toggle{
  font-family:'IBM Plex Mono',monospace;font-size:10.5px;font-weight:600;
  padding:6px 8px;border-radius:6px;border:1.5px solid var(--line);
  background:transparent;color:var(--muted);cursor:pointer;
  transition:transform .1s ease;
}
.local-toggle:hover{transform:translateY(-1px);}
.local-toggle.active{background:var(--loc-bg);border-color:var(--loc);color:var(--loc);}

.expand-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:4px 8px;border-radius:6px;}
.expand-btn:hover{background:var(--surface);}

.detail-row td{
  background:var(--surface);
  border:1px solid var(--line);border-top:none;
  border-radius:0 0 8px 8px;padding:12px 16px 14px;font-size:13px;
}
.detail-row label{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:700;}
.detail-row textarea{
  width:100%;min-height:56px;margin-top:5px;
  font-family:inherit;font-size:13px;
  border:1px solid var(--line-strong);border-radius:8px;
  padding:8px 10px;resize:vertical;background:var(--card);
}
.detail-row textarea:focus{outline:2px solid var(--amber);outline-offset:-1px;}
.detail-meta{font-size:11.5px;color:var(--muted);margin-top:6px;font-family:'IBM Plex Mono',monospace;}

.pagination{
  display:flex;align-items:center;justify-content:center;gap:14px;
  padding:14px 0 4px;font-size:13px;color:var(--muted);
}
.pagination button{
  border:1px solid var(--line-strong);background:var(--card);border-radius:7px;
  padding:7px 13px;cursor:pointer;font-weight:600;color:var(--ink);
}
.pagination button:disabled{opacity:.4;cursor:not-allowed;}

.empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;}
.empty-state .big{font-size:34px;display:block;margin-bottom:8px;}
.hidden{display:none;}

.skeleton{
  height:44px;border-radius:8px;margin-bottom:6px;
  background:linear-gradient(90deg,var(--card) 25%,#E9EAE5 45%,var(--card) 65%);
  background-size:400% 100%;animation:shimmer 1.2s infinite linear;
}
@keyframes shimmer{0%{background-position:100% 0;}100%{background-position:0 0;}}

@media (prefers-reduced-motion: reduce){
  *{animation:none !important;transition:none !important;}
}

/* ============ MOBILE ============ */
@media (max-width:760px){
  .topbar{padding:16px 14px 14px;}
  .toolbar{padding:10px 14px;}
  .table-wrap{padding:12px 10px 40px;}
  .reviewer-field{width:100%;}
  .reviewer-field input{flex:1;}
  thead{display:none;}
  table{border-spacing:0 8px;}
  tbody tr.row{display:block;background:var(--card);border:1px solid var(--line);border-radius:10px;margin-bottom:8px;overflow:hidden;box-shadow:var(--shadow);}
  tbody tr.row td{display:flex;justify-content:space-between;align-items:center;gap:10px;border:none !important;padding:7px 12px;}
  tbody tr.row td:first-child{border-left:4px solid var(--pend-line) !important;border-radius:0;}
  tbody tr.row.s-manter td:first-child{border-left-color:var(--keep) !important;}
  tbody tr.row.s-excluir td:first-child{border-left-color:var(--drop) !important;}
  tbody tr.row td::before{content:attr(data-label);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;}
  tbody tr.row td[data-label=""]::before{content:none;}
  .nome-cell{max-width:none;text-align:right;}
  .detail-row{display:block;margin:-8px 0 8px;}
  .detail-row td{display:block;border-radius:0 0 10px 10px;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand-row">
    <span class="brand-mark">Aluminas · Almoxarifado</span>
    <span class="save-pill" id="save-pill"><span class="dot"></span><span id="save-label">Pronto</span></span>
  </div>
  <h1>Revisão de Códigos de Produto</h1>
  <p class="subtitle">Marque cada item como <strong>Manter</strong> ou <strong>Excluir</strong>. Tudo salva automaticamente no banco — toque num cartão abaixo para filtrar por status.</p>
  <div class="rail" role="img" aria-label="Progresso da revisão">
    <div class="seg keep" id="rail-keep" style="width:0%"></div>
    <div class="seg drop" id="rail-drop" style="width:0%"></div>
    <div class="seg pend" style="flex:1"></div>
  </div>
  <div class="rail-caption"><span id="rail-pct">0% revisado</span><span id="rail-left">—</span></div>
  <div class="stats-row" id="stats-row">
    <button class="stat-chip" data-status=""><span class="n" id="stat-total">—</span><span class="l">Total</span></button>
    <button class="stat-chip pend" data-status="pendente"><span class="n" id="stat-pendente">—</span><span class="l">Pendentes</span></button>
    <button class="stat-chip keep" data-status="manter"><span class="n" id="stat-manter">—</span><span class="l">Manter</span></button>
    <button class="stat-chip drop" data-status="excluir"><span class="n" id="stat-excluir">—</span><span class="l">Excluir</span></button>
  </div>
</div>

<div id="banner-error" class="banner error"></div>

<div class="toolbar">
  <input type="text" id="search" placeholder="Buscar por código ou nome…" autocomplete="off">
  <select id="filter-organizador"><option value="">Todos os setores</option></select>
  <select id="filter-local"><option value="">Todos os locais</option></select>
  <div class="reviewer-field">Revisor <input type="text" id="reviewer-name" placeholder="seu nome"></div>
  <div class="spacer"></div>
  <button class="btn" id="btn-export-all">Exportar tudo (CSV)</button>
  <button class="btn primary" id="btn-export-excluir">Exportar “Excluir” (CSV)</button>
</div>

<div class="table-wrap">
  <div id="loading">
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
    <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
  </div>
  <table class="hidden" id="main-table">
    <thead>
      <tr>
        <th style="width:110px" data-sort="codigo">Código<span class="sort-arrow"></span></th>
        <th data-sort="nome">Nome<span class="sort-arrow"></span></th>
        <th style="width:64px" data-sort="unidade">Un.<span class="sort-arrow"></span></th>
        <th style="width:150px" data-sort="organizador">Setor<span class="sort-arrow"></span></th>
        <th style="width:140px">Local</th>
        <th style="width:230px">Decisão</th>
        <th style="width:40px"></th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>
  <div class="empty-state hidden" id="empty-state"><span class="big">🗂️</span>Nenhum produto encontrado com esses filtros.</div>
  <div class="pagination hidden" id="pagination"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
'use strict';

/* ============ SUPABASE ============ */
const SUPABASE_URL = "https://proqgywclcpdbnkhcjig.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InByb3FneXdjbGNwZGJua2hjamlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5Mzk3MjMsImV4cCI6MjA5ODUxNTcyM30.ZLuDnwSl-Y_Kx5WOQ1a7zNONM3AyB55PkMgd-AJAyF4";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* Tabela produto_revisao (já existente):
   codigo pk, nome, unidade, organizador,
   status ('pendente'|'manter'|'excluir'), observacao,
   revisado_por, revisado_em timestamptz, locais text[] */

const LOCAIS = [
  { key:'aluminas',    label:'Almoxarifado Aluminas',    abbr:'ALU'  },
  { key:'galpao_dois', label:'Almoxarifado Galpão Dois', abbr:'GP2'  },
  { key:'marcenaria',  label:'Almoxarifado Marcenaria',  abbr:'MARC' }
];
const PAGE_SIZE = 50;
const STATUS_CLASS = { manter:'s-manter', excluir:'s-excluir', pendente:'' };

/* ============ ESTADO ============ */
let PRODUTOS = [];                 // [{codigo,nome,unidade,organizador,_hay}]
const byCode = new Map();          // codigo -> produto
const decisions = new Map();       // codigo -> {status,observacao,revisado_por,revisado_em,locais}
const counts = { manter:0, excluir:0, pendente:0 };

const state = { q:'', org:'', status:'', local:'', sortKey:null, sortDir:'asc', page:1 };
let expandedCode = null;
let filteredCache = null;          // invalidado quando filtro/ordenação/dados mudam

function getDecision(codigo){
  return decisions.get(codigo) || { status:'pendente', observacao:'', revisado_por:null, revisado_em:null, locais:[] };
}
function invalidate(){ filteredCache = null; }

/* ============ FEEDBACK ============ */
const savePill = document.getElementById('save-pill');
const saveLabel = document.getElementById('save-label');
let pendingSaves = 0, saveResetTimer = null;

function setSaveState(mode, text){
  savePill.className = 'save-pill ' + mode;
  saveLabel.textContent = text;
}
function trackSave(promise){
  pendingSaves++;
  setSaveState('saving', 'Salvando…');
  promise.finally(()=>{
    pendingSaves--;
    if (pendingSaves <= 0){
      pendingSaves = 0;
      setSaveState('saved', 'Salvo');
      clearTimeout(saveResetTimer);
      saveResetTimer = setTimeout(()=> setSaveState('', 'Pronto'), 2500);
    }
  });
}
function showError(msg, retryFn){
  const el = document.getElementById('banner-error');
  el.innerHTML = '';
  el.append(msg);
  if (retryFn){
    const b = document.createElement('button');
    b.textContent = 'Tentar novamente';
    b.addEventListener('click', ()=>{ el.classList.remove('show'); retryFn(); });
    el.appendChild(b);
  }
  el.classList.add('show');
  if (!retryFn) setTimeout(()=> el.classList.remove('show'), 7000);
}

/* ============ CARREGAMENTO ============ */
async function fetchAllProducts(){
  const pageSize = 1000;
  const cols = 'codigo,nome,unidade,organizador,status,observacao,revisado_por,revisado_em,locais';
  const { count, error: countError } = await sb.from('produto_revisao')
    .select('codigo', { count:'exact', head:true });
  if (countError) throw countError;
  if (!count) return [];
  const pages = Math.ceil(count / pageSize);
  const reqs = [];
  for (let i = 0; i < pages; i++){
    reqs.push(sb.from('produto_revisao').select(cols).order('codigo').range(i*pageSize, i*pageSize + pageSize - 1));
  }
  const results = await Promise.all(reqs);
  const all = [];
  for (const r of results){
    if (r.error) throw r.error;
    all.push(...r.data);
  }
  return all;
}

async function init(){
  document.getElementById('loading').classList.remove('hidden');
  try{
    const rows = await fetchAllProducts();
    if (rows.length === 0){
      showError('A tabela produto_revisao está vazia no Supabase. Importe o CSV de produtos e recarregue.', init);
      return;
    }
    PRODUTOS = rows.map(r=>{
      const p = {
        codigo:r.codigo, nome:r.nome||'', unidade:r.unidade||'', organizador:r.organizador||'',
        _hay:(r.codigo + ' ' + (r.nome||'')).toLowerCase()
      };
      byCode.set(p.codigo, p);
      applyRemoteDecision(r, false);
      return p;
    });
    recount();
    populateFilters();
    initRealtime();
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('main-table').classList.remove('hidden');
    document.getElementById('pagination').classList.remove('hidden');
    renderStats();
    renderTable();
  }catch(err){
    document.getElementById('loading').classList.add('hidden');
    showError('Erro ao carregar produtos do Supabase: ' + err.message, init);
  }
}

function applyRemoteDecision(r, patchUI){
  decisions.set(r.codigo, {
    status: r.status || 'pendente',
    observacao: r.observacao || '',
    revisado_por: r.revisado_por || null,
    revisado_em: r.revisado_em || null,
    locais: r.locais || []
  });
  if (patchUI){
    recount(); renderStats(); invalidate();
    patchRow(r.codigo);
  }
}

function recount(){
  counts.manter = 0; counts.excluir = 0; counts.pendente = 0;
  for (const p of PRODUTOS) counts[getDecision(p.codigo).status]++;
}

/* ============ REALTIME (sincroniza entre revisores) ============ */
function initRealtime(){
  try{
    sb.channel('produto_revisao_live')
      .on('postgres_changes', { event:'*', schema:'public', table:'produto_revisao' }, payload=>{
        const r = payload.new;
        if (!r || !byCode.has(r.codigo)) return;
        const local = getDecision(r.codigo);
        // ignora eco do próprio save (mesmo conteúdo)
        if (local.status === r.status &&
            (local.observacao||'') === (r.observacao||'') &&
            JSON.stringify(local.locais||[]) === JSON.stringify(r.locais||[])) return;
        applyRemoteDecision(r, true);
      })
      .subscribe();
  }catch(e){ /* realtime é opcional; sem replication ativa apenas não sincroniza ao vivo */ }
}

/* ============ SALVAMENTO ============ */
async function saveDecision(codigo, patch){
  const prev = getDecision(codigo);
  const next = { ...prev, ...patch };
  decisions.set(codigo, next);
  const p = sb.from('produto_revisao').upsert({
    codigo,
    status: next.status,
    observacao: next.observacao || null,
    revisado_por: next.revisado_por || null,
    revisado_em: new Date().toISOString(),
    locais: next.locais && next.locais.length ? next.locais : []
  }).then(({error})=>{
    if (error){
      showError('Erro ao salvar "' + codigo + '": ' + error.message + '. Verifique a conexão e tente de novo.');
      setSaveState('error', 'Erro ao salvar');
    }
  });
  trackSave(p);
}

/* ============ FILTRO / ORDENAÇÃO ============ */
function getFiltered(){
  if (filteredCache) return filteredCache;
  const { q, org, status, local } = state;
  let out = PRODUTOS.filter(p=>{
    if (org && p.organizador !== org) return false;
    const d = getDecision(p.codigo);
    if (status && d.status !== status) return false;
    if (local && !(d.locais||[]).includes(local)) return false;
    if (q && !p._hay.includes(q)) return false;
    return true;
  });
  if (state.sortKey){
    const dir = state.sortDir === 'asc' ? 1 : -1;
    const key = state.sortKey;
    const coll = new Intl.Collator('pt-BR', { numeric:true, sensitivity:'base' });
    out = out.slice().sort((a,b)=> coll.compare(String(a[key]), String(b[key])) * dir);
  }
  filteredCache = out;
  return out;
}

function populateFilters(){
  const cnt = {};
  PRODUTOS.forEach(p=>{ cnt[p.organizador] = (cnt[p.organizador]||0)+1; });
  const sel = document.getElementById('filter-organizador');
  Object.keys(cnt).sort((a,b)=>cnt[b]-cnt[a]).forEach(org=>{
    const o = document.createElement('option');
    o.value = org; o.textContent = `${org} (${cnt[org]})`;
    sel.appendChild(o);
  });
  const ls = document.getElementById('filter-local');
  LOCAIS.forEach(l=>{
    const o = document.createElement('option');
    o.value = l.key; o.textContent = l.label;
    ls.appendChild(o);
  });
}

/* ============ RENDER ============ */
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function renderStats(){
  const total = PRODUTOS.length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pendente').textContent = counts.pendente;
  document.getElementById('stat-manter').textContent = counts.manter;
  document.getElementById('stat-excluir').textContent = counts.excluir;
  const done = counts.manter + counts.excluir;
  const pct = total ? done/total*100 : 0;
  document.getElementById('rail-keep').style.width = (total ? counts.manter/total*100 : 0) + '%';
  document.getElementById('rail-drop').style.width = (total ? counts.excluir/total*100 : 0) + '%';
  document.getElementById('rail-pct').textContent = pct.toFixed(1).replace('.',',') + '% revisado';
  document.getElementById('rail-left').textContent = counts.pendente + ' restantes';
  document.querySelectorAll('.stat-chip').forEach(c=>{
    c.classList.toggle('active', c.dataset.status === state.status);
  });
}

function rowHtml(p){
  const d = getDecision(p.codigo);
  const locais = d.locais || [];
  return `
    <td class="codigo-cell mono" data-label="Código">${escapeHtml(p.codigo)}</td>
    <td class="nome-cell" data-label="Nome">${escapeHtml(p.nome)}${d.observacao ? '<span class="has-obs" title="Tem observação">✎</span>' : ''}</td>
    <td data-label="Unidade">${escapeHtml(p.unidade)}</td>
    <td data-label="Setor"><span class="badge">${escapeHtml(p.organizador)}</span></td>
    <td data-label="Local">
      <div class="local-group">
        ${LOCAIS.map(l=>`<button class="local-toggle ${locais.includes(l.key)?'active':''}" data-local="${l.key}" title="${escapeHtml(l.label)}">${l.abbr}</button>`).join('')}
      </div>
    </td>
    <td data-label="Decisão">
      <div class="status-group">
        <button class="stamp ${d.status==='manter'?'active-manter':''}" data-action="manter">Manter</button>
        <button class="stamp ${d.status==='excluir'?'active-excluir':''}" data-action="excluir">Excluir</button>
        <button class="stamp ${d.status==='pendente'?'active-pendente':''}" data-action="pendente" title="Voltar para pendente">?</button>
      </div>
    </td>
    <td data-label=""><button class="expand-btn" data-action="expand" title="Observações">${expandedCode===p.codigo?'▲':'▾'}</button></td>`;
}

function detailHtml(p){
  const d = getDecision(p.codigo);
  const meta = [];
  if (d.revisado_por) meta.push('Revisado por ' + escapeHtml(d.revisado_por));
  if (d.revisado_em) meta.push(new Date(d.revisado_em).toLocaleString('pt-BR'));
  return `
    <td colspan="7">
      <label>Observação</label>
      <textarea placeholder="Motivo, quantidade em estoque, substituto, etc.">${escapeHtml(d.observacao||'')}</textarea>
      <div class="detail-meta">${meta.join(' · ') || 'Ainda não revisado.'}</div>
    </td>`;
}

function renderTable(){
  const filtered = getFiltered();
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (state.page > totalPages) state.page = totalPages;
  const start = (state.page-1)*PAGE_SIZE;
  const pageItems = filtered.slice(start, start+PAGE_SIZE);

  document.getElementById('empty-state').classList.toggle('hidden', filtered.length > 0);

  const frag = document.createDocumentFragment();
  for (const p of pageItems){
    const tr = document.createElement('tr');
    tr.className = 'row ' + (STATUS_CLASS[getDecision(p.codigo).status]||'');
    tr.dataset.codigo = p.codigo;
    tr.innerHTML = rowHtml(p);
    frag.appendChild(tr);
    if (expandedCode === p.codigo){
      const det = document.createElement('tr');
      det.className = 'detail-row';
      det.dataset.codigo = p.codigo;
      det.innerHTML = detailHtml(p);
      frag.appendChild(det);
    }
  }
  const tbody = document.getElementById('table-body');
  tbody.replaceChildren(frag);
  renderPagination(totalPages, filtered.length);
}

/* Atualiza apenas a linha afetada — sem re-render da página inteira */
function patchRow(codigo){
  const tr = document.querySelector(`tr.row[data-codigo="${CSS.escape(codigo)}"]`);
  if (!tr) return;
  const p = byCode.get(codigo);
  const d = getDecision(codigo);
  tr.className = 'row ' + (STATUS_CLASS[d.status]||'');
  tr.innerHTML = rowHtml(p);
  const det = document.querySelector(`tr.detail-row[data-codigo="${CSS.escape(codigo)}"]`);
  if (det){
    const focused = det.contains(document.activeElement);
    if (!focused) det.innerHTML = detailHtml(p); // não sobrescreve enquanto digita
  }
}

function renderPagination(totalPages, totalItems){
  const el = document.getElementById('pagination');
  el.innerHTML = `
    <button data-page="prev" ${state.page<=1?'disabled':''}>← Anterior</button>
    <span>Página ${state.page} de ${totalPages} · ${totalItems} itens</span>
    <button data-page="next" ${state.page>=totalPages?'disabled':''}>Próxima →</button>`;
}

/* ============ AÇÕES ============ */
function reviewerName(){
  return document.getElementById('reviewer-name').value.trim() || null;
}

function setStatus(codigo, status, btnEl){
  const prev = getDecision(codigo).status;
  if (prev === status) return;
  counts[prev]--; counts[status]++;
  saveDecision(codigo, { status, revisado_por: reviewerName() });
  invalidate();
  renderStats();
  if (btnEl){
    btnEl.classList.add('flash');
    setTimeout(()=> btnEl.classList.remove('flash'), 300);
  }
  if (state.status && state.status !== status){
    // item saiu do filtro atual — remove com re-render leve
    setTimeout(renderTable, 260);
  } else {
    patchRow(codigo);
  }
}

function toggleLocal(codigo, localKey){
  const prev = getDecision(codigo);
  const set = new Set(prev.locais||[]);
  set.has(localKey) ? set.delete(localKey) : set.add(localKey);
  saveDecision(codigo, { locais:[...set], revisado_por: reviewerName() });
  invalidate();
  if (state.local && !set.has(state.local)){
    setTimeout(renderTable, 200);
  } else {
    patchRow(codigo);
  }
}

const obsTimers = {};
function onObsInput(codigo, value){
  clearTimeout(obsTimers[codigo]);
  obsTimers[codigo] = setTimeout(()=>{
    saveDecision(codigo, { observacao:value, revisado_por: reviewerName() });
  }, 600);
}

/* ============ EVENTOS (delegação — 1 listener p/ tabela toda) ============ */
document.getElementById('table-body').addEventListener('click', e=>{
  const btn = e.target.closest('button');
  if (!btn) return;
  const tr = btn.closest('tr');
  const codigo = tr && tr.dataset.codigo;
  if (!codigo) return;
  if (btn.dataset.action === 'expand'){
    expandedCode = expandedCode === codigo ? null : codigo;
    renderTable();
  } else if (btn.dataset.action){
    setStatus(codigo, btn.dataset.action, btn);
  } else if (btn.dataset.local){
    toggleLocal(codigo, btn.dataset.local);
  }
});
document.getElementById('table-body').addEventListener('input', e=>{
  if (e.target.tagName === 'TEXTAREA'){
    const tr = e.target.closest('tr');
    if (tr && tr.dataset.codigo) onObsInput(tr.dataset.codigo, e.target.value);
  }
});

document.getElementById('pagination').addEventListener('click', e=>{
  const b = e.target.closest('button[data-page]');
  if (!b || b.disabled) return;
  state.page += b.dataset.page === 'next' ? 1 : -1;
  renderTable();
  window.scrollTo({ top:0, behavior:'smooth' });
});

document.getElementById('stats-row').addEventListener('click', e=>{
  const chip = e.target.closest('.stat-chip');
  if (!chip) return;
  state.status = (state.status === chip.dataset.status) ? '' : chip.dataset.status;
  state.page = 1;
  invalidate();
  renderStats();
  renderTable();
});

document.querySelectorAll('th[data-sort]').forEach(th=>{
  th.addEventListener('click', ()=>{
    const key = th.dataset.sort;
    if (state.sortKey === key){
      state.sortDir = state.sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      state.sortKey = key; state.sortDir = 'asc';
    }
    document.querySelectorAll('th[data-sort] .sort-arrow').forEach(a=> a.textContent='');
    th.querySelector('.sort-arrow').textContent = state.sortDir === 'asc' ? ' ▲' : ' ▼';
    state.page = 1;
    invalidate();
    renderTable();
  });
});

let searchTimer = null;
document.getElementById('search').addEventListener('input', e=>{
  clearTimeout(searchTimer);
  searchTimer = setTimeout(()=>{
    state.q = e.target.value.trim().toLowerCase();
    state.page = 1;
    invalidate();
    renderTable();
  }, 180);
});
document.getElementById('filter-organizador').addEventListener('change', e=>{
  state.org = e.target.value; state.page = 1; invalidate(); renderTable();
});
document.getElementById('filter-local').addEventListener('change', e=>{
  state.local = e.target.value; state.page = 1; invalidate(); renderTable();
});

/* Revisor lembrado no aparelho */
const revInput = document.getElementById('reviewer-name');
try{
  revInput.value = localStorage.getItem('revisor_nome') || '';
  revInput.addEventListener('input', ()=> localStorage.setItem('revisor_nome', revInput.value));
}catch(e){}

/* ============ EXPORT CSV ============ */
function csvEscape(v){
  if (v == null) return '';
  return '"' + String(v).replace(/"/g,'""') + '"';
}
function downloadCsv(filename, rows){
  const label = { manter:'Manter', excluir:'Excluir', pendente:'Pendente' };
  const header = ['codigo','nome','unidade','organizador','decisao',
    'almoxarifado_aluminas','almoxarifado_galpao_dois','almoxarifado_marcenaria',
    'observacao','revisado_por','revisado_em'];
  const lines = [header.join(';')];
  for (const p of rows){
    const d = getDecision(p.codigo);
    const locais = d.locais||[];
    lines.push([
      p.codigo, p.nome, p.unidade, p.organizador,
      label[d.status]||d.status,
      locais.includes('aluminas')?'SIM':'NAO',
      locais.includes('galpao_dois')?'SIM':'NAO',
      locais.includes('marcenaria')?'SIM':'NAO',
      d.observacao||'', d.revisado_por||'', d.revisado_em||''
    ].map(csvEscape).join(';'));
  }
  const blob = new Blob(["\uFEFF"+lines.join('\n')], { type:'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}
document.getElementById('btn-export-all').addEventListener('click', ()=> downloadCsv('produtos_revisao_completa.csv', PRODUTOS));
document.getElementById('btn-export-excluir').addEventListener('click', ()=>{
  downloadCsv('produtos_para_excluir.csv', PRODUTOS.filter(p=> getDecision(p.codigo).status==='excluir'));
});

init();
</script>
